<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — JahFresh Fridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-slate">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">JahFresh Fridge</a>
    </div>
</nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card shadow-sm">
                <div class="card-header bg-slate text-white fw-semibold">Create Account</div>
                <div class="card-body">

                    <div id="error-message" class="alert alert-danger d-none"></div>
                    <div id="success-message" class="alert alert-success d-none"></div>

                    <form id="register-form">
                        <div class="row mb-3">
                            <div class="col">
                                <label for="firstName" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col">
                                <label for="lastName" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required minlength="8">
                            <div class="form-text">Minimum 8 characters.</div>
                        </div>
                        <button type="submit" class="btn btn-slate w-100">Create Account</button>
                    </form>

                    <hr>
                    <p class="text-center text-muted mb-0 small">
                        Already have an account? <a href="/login.html">Sign in</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</main>

<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const errorEl = document.getElementById('error-message');
        const successEl = document.getElementById('success-message');
        errorEl.classList.add('d-none');
        successEl.classList.add('d-none');

        const body = {
            firstName: document.getElementById('firstName').value,
            lastName:  document.getElementById('lastName').value,
            email:     document.getElementById('email').value,
            username:  document.getElementById('username').value,
            password:  document.getElementById('password').value
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await response.json();

            if (!response.ok) {
                errorEl.textContent = data.error || 'Registration failed. Please try again.';
                errorEl.classList.remove('d-none');
                return;
            }

            successEl.textContent = 'Account created! Redirecting to login...';
            successEl.classList.remove('d-none');
            setTimeout(() => window.location.href = '/login.html', 1500);

        } catch (err) {
            errorEl.textContent = 'Could not connect to server. Please try again.';
            errorEl.classList.remove('d-none');
        }
    });
</script>

</body>
</html>
