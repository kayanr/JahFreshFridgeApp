<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JahFresh Fridge</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧊</text></svg>">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-slate">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">JahFresh Fridge</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/fooditems.html">My Fridge</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports.html">Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="#" id="nav-logout">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-5 text-center">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="display-4 fw-bold mb-3">Welcome to JahFresh Fridge</h1>
            <p class="lead text-muted mb-4">
                Track your food items, monitor expiry dates, and reduce waste —
                all in one place.
            </p>
            <a href="/fooditems.html" class="btn btn-success btn-lg">View My Fridge</a>
        </div>
    </div>
</main>

<footer class="border-top py-3 mt-auto">
    <div class="container text-center text-muted small">
        &copy; <span id="year"></span> JahFresh Fridge. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script>
    document.getElementById('year').textContent = new Date().getFullYear();
    document.getElementById('nav-logout').addEventListener('click', (e) => {
        e.preventDefault();
        logout();
    });
</script>
</body>
</html>
