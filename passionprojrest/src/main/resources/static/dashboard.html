<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - JahFresh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-slate">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">JahFresh Fridge</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="/dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/fooditems.html">My Fridge</a></li>
                <li class="nav-item"><a class="nav-link" href="/reports.html">Reports</a></li>
                <li class="nav-item"><a class="nav-link" href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="mb-0">Dashboard</h2>
        <button class="btn btn-outline-secondary" id="btn-refresh-dashboard">Refresh</button>
    </div>

    <!-- Alert area -->
    <div id="alert-container"></div>

    <!-- Expiring soon banner -->
    <div id="expiring-soon-banner" class="alert alert-warning d-none" role="alert">
        <strong>&#x23F0; Heads up!</strong> <span id="expiring-soon-message"></span>
        <a href="/fooditems.html?filter=EXPIRING_SOON" class="alert-link ms-1">View items</a>
    </div>

    <!-- Total items card -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-slate shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="card-title fw-semibold mb-1">Total Items</div>
                        <div class="display-6 fw-bold" id="stat-total">—</div>
                    </div>
                    <div class="stat-icon">&#127968;</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Status cards -->
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card text-white bg-success shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="card-title fw-semibold mb-1">Fresh</div>
                        <div class="display-6 fw-bold" id="stat-fresh">—</div>
                    </div>
                    <div class="stat-icon">&#x2705;</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-dark bg-warning shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="card-title fw-semibold mb-1">Expiring Soon</div>
                        <div class="display-6 fw-bold" id="stat-expiring-soon">—</div>
                    </div>
                    <div class="stat-icon">&#x23F0;</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-danger shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="card-title fw-semibold mb-1">Expired</div>
                        <div class="display-6 fw-bold" id="stat-expired">—</div>
                    </div>
                    <div class="stat-icon">&#x274C;</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-secondary shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="card-title fw-semibold mb-1">Consumed</div>
                        <div class="display-6 fw-bold" id="stat-consumed">—</div>
                    </div>
                    <div class="stat-icon">&#x1F37D;&#xFE0F;</div>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-dark shadow-sm">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <div class="card-title fw-semibold mb-1">Discarded</div>
                        <div class="display-6 fw-bold" id="stat-discarded">—</div>
                    </div>
                    <div class="stat-icon">&#x1F5D1;&#xFE0F;</div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer class="border-top py-3 mt-4">
    <div class="container text-center text-muted small">
        &copy; <span id="year"></span> JahFresh Fridge. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/api.js"></script>
<script src="/js/dashboard.js"></script>
<script>
    requireAuth();
    document.getElementById('year').textContent = new Date().getFullYear();
</script>
</body>
</html>
