<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — JahFresh Fridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-slate">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">JahFresh Fridge</a>
    </div>
</nav>

<main class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-header bg-slate text-white fw-semibold">Sign In</div>
                <div class="card-body">

                    <div id="error-message" class="alert alert-danger d-none"></div>

                    <form id="login-form">
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-slate w-100">Sign In</button>
                    </form>

                    <hr>
                    <p class="text-center text-muted mb-0 small">
                        Don't have an account? <a href="/register.html">Register</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</main>

<script>
    // Redirect already-authenticated users
    if (localStorage.getItem('token')) {
        window.location.href = '/fooditems.html';
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error-message');

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                errorEl.textContent = data.error || 'Login failed. Please try again.';
                errorEl.classList.remove('d-none');
                return;
            }

            // Store the token and redirect
            localStorage.setItem('token', data.token);
            window.location.href = '/fooditems.html';

        } catch (err) {
            errorEl.textContent = 'Could not connect to server. Please try again.';
            errorEl.classList.remove('d-none');
        }
    });
</script>

</body>
</html>
